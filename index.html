<!DOCTYPE html>
<html>
<head>
    <title>Reaction Experiment</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #f0f2f5; }
        .container { background: white; padding: 30px; border-radius: 12px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 90%; max-width: 500px; }
        .hidden { display: none; }
        #task-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; cursor: crosshair; }
        #target { width: 80px; height: 80px; background: #ff4757; border-radius: 50%; position: absolute; display: none; }
        #status { position: absolute; top: 10px; width: 100%; text-align: center; font-weight: bold; color: #333; }
        canvas { margin-top: 20px; }
    </style>
</head>
<body>

<div id="welcome" class="container">
    <h1>Reaction Task</h1>
    <p>Click the button below to start the 10 trials.</p>
    <input type="text" id="pID" placeholder="Enter Participant ID" style="padding:12px; margin-bottom:15px; width: 80%; border: 1px solid #ccc; border-radius: 5px;"><br>
    <button id="startBtn" style="padding:12px 25px; cursor:pointer; background-color: #007bff; color: white; border: none; border-radius: 5px; font-size: 1rem;">Start Experiment</button>
</div>

<div id="task-screen" class="hidden">
    <div id="status">Trial: <span id="count">0</span> / 10</div>
    <div id="target"></div>
</div>

<div id="results" class="container hidden">
    <h2>Experiment Complete</h2>
    <p id="avgMsg" style="font-size: 1.2rem; font-weight: bold; color: #007bff;"></p>
    <canvas id="chart" width="400" height="250"></canvas>
    <p style="font-size: 0.8rem; color: #666; margin-top: 15px;">Your scores have been recorded to the database.</p>
    <button onclick="location.reload()" style="padding:10px 20px; cursor:pointer; background-color: #6c757d; color: white; border: none; border-radius: 5px;">Restart</button>
</div>

<script>
    // --- INCORPORATED URL ---
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbygfcpG-y8mKNEh_-rVJlZM_cpbXFaT-X8Gs9U9XLGB0pObHO2T2mYar9Y9wWZMq72N/exec";

    let trials = [];
    let startTime;
    let pID = "";

    const startBtn = document.getElementById('startBtn');
    
    // Simple direct click handler
    startBtn.onclick = function() {
        pID = document.getElementById('pID').value.trim() || "Guest-" + Math.floor(Math.random()*1000);
        document.getElementById('welcome').classList.add('hidden');
        document.getElementById('task-screen').classList.remove('hidden');
        nextTrial();
    };

    function nextTrial() {
        if (trials.length >= 10) {
            finish();
            return;
        }
        const target = document.getElementById('target');
        target.style.display = 'none';
        
        // Random delay between 0.5 and 1.5 seconds
        setTimeout(() => {
            const maxX = window.innerWidth - 100;
            const maxY = window.innerHeight - 100;
            target.style.top = Math.random() * maxY + "px";
            target.style.left = Math.random() * maxX + "px";
            target.style.display = 'block';
            startTime = performance.now();
        }, 500 + Math.random() * 1000);
    }

    document.getElementById('target').onmousedown = function() {
        const rt = performance.now() - startTime;
        trials.push(rt);
        document.getElementById('count').innerText = trials.length;
        nextTrial();
    };

    function finish() {
        document.getElementById('task-screen').classList.add('hidden');
        document.getElementById('results').classList.remove('hidden');
        document.getElementById('avgMsg').innerText = "Uploading trials...";
        
        const avg = trials.reduce((a, b) => a + b) / trials.length;
        // Format trial data for the script
        const trialsCSV = trials.map(Math.round).join(",");
        const cb = 'jsonp_' + Date.now();

        // JSONP Callback handler
        window[cb] = function(data) {
            document.getElementById('avgMsg').innerText = "Your Average: " + Math.round(avg) + "ms";
            drawChart(data, avg);
            // Cleanup the script tag
            const oldScript = document.getElementById('jsonp-script');
            if (oldScript) oldScript.remove();
        };

        const script = document.createElement('script');
        script.id = 'jsonp-script';
        script.src = `${WEB_APP_URL}?id=${encodeURIComponent(pID)}&allTrials=${trialsCSV}&callback=${cb}`;
        document.body.appendChild(script);
    }

    function drawChart(history, userAvg) {
        const ctx = document.getElementById('chart').getContext('2d');
        if (!history || history.length === 0) history = [userAvg];

        const bins = {};
        const size = 50;
        
        history.forEach(v => {
            const b = Math.floor(v / size) * size;
            bins[b] = (bins[b] || 0) + 1;
        });

        const sortedKeys = Object.keys(bins).map(Number).sort((a,b) => a-b);
        const labels = sortedKeys.map(v => v + "ms");
        const counts = sortedKeys.map(v => bins[v]);

        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [{ 
                    label: 'Participants', 
                    data: counts, 
                    backgroundColor: 'rgba(0, 123, 255, 0.5)',
                    borderColor: 'rgba(0, 123, 255, 1)',
                    borderWidth: 1 
                }]
            },
            options: {
                scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } }
            }
        });
    }
</script>
</body>
</html>
