<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reaction Time Experiment</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .screen {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .container {
            background: white;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            width: 90%;
            max-width: 600px;
        }

        .hidden { display: none !important; }

        input {
            padding: 12px;
            margin: 15px 0;
            border: 1px solid #ddd;
            border-radius: 6px;
            width: 250px;
            font-size: 1rem;
        }

        button {
            padding: 12px 24px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            transition: background 0.2s;
        }

        button:hover { background-color: #0056b3; }

        #task-screen { background-color: #ffffff; cursor: crosshair; }
        
        #target-circle {
            width: 100px;
            height: 100px;
            background-color: #ff4757;
            border-radius: 50%;
            position: absolute;
            display: none;
        }

        #status-msg {
            position: absolute;
            top: 20px;
            font-weight: bold;
            color: #555;
            pointer-events: none;
        }

        canvas { margin-top: 20px; width: 100% !important; height: auto !important; }
    </style>
</head>
<body>

    <div id="welcome-screen" class="screen">
        <div class="container">
            <h1>Reaction Task</h1>
            <p>Enter your ID to begin the 10-trial experiment.</p>
            <input type="text" id="participant-id" placeholder="Participant ID (Optional)">
            <br>
            <button id="start-btn">Start Task</button>
        </div>
    </div>

    <div id="task-screen" class="screen hidden">
        <div id="status-msg">Trial: <span id="trial-count">0</span> / 10</div>
        <div id="target-circle"></div>
    </div>

    <div id="results-screen" class="screen hidden">
        <div class="container">
            <h2>Your Results</h2>
            <p id="user-avg-text" style="font-size: 1.2rem; font-weight: bold; color: #007bff;"></p>
            <div style="position: relative; height:40vh; width:100%">
                <canvas id="rtChart"></canvas>
            </div>
            <p style="font-size: 0.85rem; color: #666; margin-top: 20px;">
                The blue bars show historical data. The <span style="color:red; font-weight:bold;">red line</span> is your average.
            </p>
            <button onclick="location.reload()" style="margin-top:10px; background-color:#6c757d;">Restart</button>
        </div>
    </div>

    <script>
        // 1. SETTINGS
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwOwXPyZSBGsNubFCytcWHMW0yLUBd9XLs5Y74Vt7itmpoO_7eC2W5yZFI_zoVep2eL/exec";
        
        let participantId = "";
        let trials = [];
        let startTime = 0;
        let trialIndex = 0;
        const MAX_TRIALS = 10;

        const welcomeScreen = document.getElementById('welcome-screen');
        const taskScreen = document.getElementById('task-screen');
        const resultsScreen = document.getElementById('results-screen');
        const targetCircle = document.getElementById('target-circle');
        const trialDisplay = document.getElementById('trial-count');

        // 2. START LOGIC
        document.getElementById('start-btn').addEventListener('click', () => {
            const inputVal = document.getElementById('participant-id').value.trim();
            // Assign random ID if blank
            participantId = inputVal ? inputVal : "User-" + Math.random().toString(36).substr(2, 5).toUpperCase();
            
            console.log("Starting experiment for ID:", participantId);
            
            welcomeScreen.classList.add('hidden');
            taskScreen.classList.remove('hidden');
            startNextTrial();
        });

        function startNextTrial() {
            if (trialIndex >= MAX_TRIALS) {
                finishExperiment();
                return;
            }
            targetCircle.style.display = 'none';
            setTimeout(() => {
                const maxX = window.innerWidth - 120;
                const maxY = window.innerHeight - 120;
                targetCircle.style.left = Math.floor(Math.random() * maxX) + "px";
                targetCircle.style.top = Math.floor(Math.random() * maxY) + "px";
                targetCircle.style.display = 'block';
                startTime = performance.now();
            }, 600);
        }

        targetCircle.addEventListener('mousedown', () => {
            const rt = performance.now() - startTime;
            trials.push(rt);
            trialIndex++;
            trialDisplay.innerText = trialIndex;
            startNextTrial();
        });

        // 3. SUBMISSION LOGIC (Matches your Manual Test URL)
        async function finishExperiment() {
            taskScreen.classList.add('hidden');
            resultsScreen.classList.remove('hidden');
            document.getElementById('user-avg-text').innerText = "Analyzing data...";

            const avgRT = trials.reduce((a, b) => a + b, 0) / trials.length;
            console.log("Calculated Average:", avgRT);

            const callbackName = 'jsonp_' + Date.now();
            window[callbackName] = function(history) {
                console.log("Historical data fetched:", history);
                document.getElementById('user-avg-text').innerText = `Your Average RT: ${Math.round(avgRT)}ms`;
                renderChart(history, avgRT);
                delete window[callbackName];
            };

            // Build URL: id=B, avg=D. The Google Script handles "10 Trials" for C and Date for A.
            const finalUrl = `${WEB_APP_URL}?id=${encodeURIComponent(participantId)}&avg=${avgRT.toFixed(2)}&callback=${callbackName}`;
            
            console.log("Request URL:", finalUrl);

            const script = document.createElement('script');
            script.src = finalUrl;
            document.body.appendChild(script);
        }

        // 4. CHART LOGIC
        function renderChart(history, userAvg) {
            const ctx = document.getElementById('rtChart').getContext('2d');
            
            // Safety: Show current user if database is empty
            if (!history || history.length === 0) {
                history = [userAvg];
            }
            
            const binSize = 50;
            const bins = {};

            history.forEach(val => {
                const bin = Math.floor(val / binSize) * binSize;
                bins[bin] = (bins[bin] || 0) + 1;
            });

            const sortedBins = Object.keys(bins).map(Number).sort((a, b) => a - b);
            const dataPoints = sortedBins.map(b => bins[b]);
            const labels = sortedBins.map(b => b + 'ms');

            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Number of Participants',
                        data: dataPoints,
                        backgroundColor: 'rgba(54, 162, 235, 0.5)',
                        borderColor: 'rgba(54, 162, 235, 1)',
                        borderWidth: 1
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: { beginAtZero: true, ticks: { stepSize: 1 } }
                    },
                    plugins: { legend: { display: false } }
                },
                plugins: [{
                    afterDraw: (chart) => {
                        const {ctx, chartArea: {top, bottom}, scales: {x}} = chart;
                        const userBinLabel = Math.floor(userAvg / binSize) * binSize + 'ms';
                        const xPos = x.getPixelForValue(userBinLabel);

                        if (xPos) {
                            ctx.save();
                            ctx.strokeStyle = 'red';
                            ctx.lineWidth = 4;
                            ctx.beginPath();
                            ctx.moveTo(xPos, top);
                            ctx.lineTo(xPos, bottom);
                            ctx.stroke();
                            ctx.restore();
                        }
                    }
                }]
            });
        }
    </script>
</body>
</html>
